[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = ".next"

[[redirects]]
  from = "/api/v1/*"
  to = "/.netlify/functions/:splat"
  status = 200

[context.production]
  command = "npm run build"

[context.preview]
  command = "npm run build"

# Environment variables for production
[env]
  DATABASE_URL = "postgresql://..."
  MPESA_API_KEY = ""
  PAYPAL_CLIENT_ID = ""
  PAYPAL_CLIENT_SECRET = ""
  BANK_API_KEY = ""
  ENCRYPTION_KEY = ""